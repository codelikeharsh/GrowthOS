packages:
  - apps/*
  - packages/*
  - services/*

allowBuilds:
  '@nestjs/core': false
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': false
  '@tailwindcss/oxide': true
  argon2: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  sharp: true
  unrs-resolver: true
