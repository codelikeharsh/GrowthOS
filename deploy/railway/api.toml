[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm railway:build:api"
watchPatterns = ["apps/api/**", "packages/**", "package.json", "pnpm-lock.yaml", "pnpm-workspace.yaml", "turbo.json"]

[deploy]
preDeployCommand = "pnpm railway:prisma:deploy"
startCommand = "pnpm railway:start:api"
healthcheckPath = "/api/v1/health/ready"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
