[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm railway:build:worker"
watchPatterns = ["apps/worker/**", "packages/**", "package.json", "pnpm-lock.yaml", "pnpm-workspace.yaml", "turbo.json"]

[deploy]
startCommand = "pnpm railway:start:worker"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
