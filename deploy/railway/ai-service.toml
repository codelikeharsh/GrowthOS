[build]
builder = "DOCKERFILE"
dockerfilePath = "infrastructure/docker/ai-service.Dockerfile"
watchPatterns = ["services/ai-service/**", "infrastructure/docker/ai-service.Dockerfile"]

[deploy]
startCommand = "python3 -m uvicorn growthos_ai.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health/live"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
