[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm railway:build:web"
watchPatterns = ["apps/web/**", "packages/**", "package.json", "pnpm-lock.yaml", "pnpm-workspace.yaml", "turbo.json"]

[deploy]
startCommand = "pnpm railway:start:web"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
