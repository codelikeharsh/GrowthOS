name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  node-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm db:validate
      - run: pnpm build

  python-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12.4
          cache: pip
          cache-dependency-path: services/ai-service/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m mypy src tests
      - run: python -m pytest

  dependency-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17.6-alpine
        env:
          POSTGRES_DB: growthos
          POSTGRES_USER: growthos_local
          POSTGRES_PASSWORD: growthos_local_7f3d
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U growthos_local -d growthos"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:8.2.2-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://growthos_local:growthos_local_7f3d@localhost:5432/growthos?schema=public
      REDIS_URL: redis://localhost:6379
      RUN_INTEGRATION_TESTS: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm test:integration

  image-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - run: docker build --file infrastructure/docker/ai-service.Dockerfile --tag growthos-ai-service:ci .
